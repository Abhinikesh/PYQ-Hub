<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - PYQ Hub</title>
  <link rel="icon" href="pyq logo.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="loginsignup.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-page">

  <div class="auth-top">
    <a href="index.html">← Back to Home</a>
  </div>

  <main class="auth-shell">
    <div class="auth-card" id="authCard">
      <div class="auth-form-view" id="authFormView">
        <div class="auth-card-header">
          <div class="auth-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          </div>
          <h1>Welcome back</h1>
          <p>Sign in to access your dashboard and uploads</p>
        </div>

        <form id="login-form">
          <div class="form_group">
            <label for="login-email">Email</label>
            <input id="login-email" class="form_style" type="email" placeholder="you@college.edu" autocomplete="email">
          </div>

          <div class="form_group">
            <label for="login-password">Password</label>
            <div class="password-wrap">
              <input id="login-password" class="form_style" type="password" placeholder="Enter your password" autocomplete="current-password">
              <button type="button" class="password-toggle" data-password-toggle="login-password" aria-label="Show password">
                <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="form-row">
            <label class="remember-me">
              <input type="checkbox" id="remember-me" checked>
              Remember me
            </label>
          </div>

          <button type="submit" class="btn-auth">Sign In</button>
        </form>

        <div class="google-auth-separator">
          <span>or</span>
        </div>
        <div id="googleBtn" class="google-auth-btn"></div>

        <p class="auth-switch">Don't have an account? <a href="signup.html" id="signupLink">Sign up</a></p>
      </div>

      <div class="auth-success is-hidden" id="authSuccess">
        <div class="success-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <p class="auth-success-text">Welcome back!</p>
      </div>
    </div>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
